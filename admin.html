<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeNest — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #1a1d25;
    --border: #252830;
    --accent: #00e5a0;
    --accent2: #00b4ff;
    --warn: #ff6b35;
    --text: #e8eaf0;
    --muted: #6b7280;
    --danger: #ff4757;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* LOGIN SCREEN */
  #login-screen {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .login-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
  }

  .login-logo span { color: var(--accent); }

  .login-sub {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .login-field { margin-bottom: 16px; text-align: left; }

  .login-field label {
    display: block;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .login-field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .login-field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,160,0.1);
  }

  .login-btn {
    width: 100%;
    margin-top: 8px;
    padding: 14px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .login-btn:active { transform: translateY(0); }

  .login-error {
    margin-top: 12px;
    font-size: 0.72rem;
    color: var(--danger);
    display: none;
  }

  /* DASHBOARD */
  #dashboard { display: none; position: relative; z-index: 1; }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,12,16,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: -0.03em;
  }

  .logo span { color: var(--accent); }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .admin-badge {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--warn);
    border: 1px solid rgba(255,107,53,0.3);
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }

  .logout-btn {
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    transition: color 0.2s, border-color 0.2s;
  }

  .logout-btn:hover { color: var(--danger); border-color: var(--danger); }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 90px 24px 60px;
  }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .stat-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
  }

  .stat-num.orange { color: var(--warn); }
  .stat-num.red { color: var(--danger); }
  .stat-num.blue { color: var(--accent2); }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    animation: fadeUp 0.6s 0.2s ease both;
    flex-wrap: wrap;
    gap: 12px;
  }

  .toolbar-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
  }

  .toolbar-filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn.active, .filter-btn:hover {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--accent);
  }

  /* REPORT TABLE */
  .reports-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .report-row {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 140px 1fr 130px 110px 100px 90px;
    align-items: center;
    gap: 16px;
    transition: background 0.15s;
    cursor: pointer;
  }

  .report-row:last-child { border-bottom: none; }
  .report-row:hover { background: var(--surface2); }
  .report-row.urgent { border-left: 3px solid var(--danger); }

  .report-header {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 140px 1fr 130px 110px 100px 90px;
    gap: 16px;
    background: var(--surface2);
  }

  .report-header span {
    font-size: 0.63rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .ref-code {
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .report-desc {
    font-size: 0.75rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .report-sector {
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .severity-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .sev-low { background: rgba(0,229,160,0.1); color: var(--accent); }
  .sev-medium { background: rgba(0,180,255,0.1); color: var(--accent2); }
  .sev-high { background: rgba(255,107,53,0.1); color: var(--warn); }
  .sev-critical { background: rgba(255,71,87,0.15); color: var(--danger); }

  .status-pill {
    display: inline-flex;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.63rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .pill-new { background: rgba(0,180,255,0.1); color: var(--accent2); }
  .pill-review { background: rgba(255,107,53,0.1); color: var(--warn); }
  .pill-investigating { background: rgba(0,229,160,0.1); color: var(--accent); }
  .pill-resolved { background: rgba(107,114,128,0.2); color: var(--muted); }

  .flag-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    opacity: 0.4;
    transition: opacity 0.2s, transform 0.2s;
  }

  .flag-btn:hover { opacity: 1; transform: scale(1.2); }
  .flag-btn.flagged { opacity: 1; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    width: 100%;
    max-width: 600px;
    max-height: 85vh;
    overflow-y: auto;
    animation: fadeUp 0.3s ease both;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
  }

  .close-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.3rem;
    cursor: pointer;
    transition: color 0.2s;
  }

  .close-btn:hover { color: var(--text); }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
    gap: 16px;
  }

  .detail-row:last-of-type { border-bottom: none; }

  .detail-label {
    color: var(--muted);
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    flex-shrink: 0;
    min-width: 120px;
  }

  .detail-val { color: var(--text); text-align: right; line-height: 1.6; }

  .description-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-size: 0.78rem;
    line-height: 1.8;
    color: var(--text);
    margin: 16px 0;
  }

  .section-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 20px 0 10px;
  }

  .status-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .status-select:focus { border-color: var(--accent); }

  .note-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    outline: none;
    resize: vertical;
    min-height: 80px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  .note-input:focus { border-color: var(--accent); }

  .save-btn {
    padding: 12px 24px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .save-btn:hover { opacity: 0.85; }

  .timeline-list { margin-top: 8px; }

  .tl-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
  }

  .tl-item:last-child { border-bottom: none; }

  .tl-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    margin-top: 4px;
  }

  .tl-content { line-height: 1.6; }
  .tl-date { color: var(--muted); font-size: 0.68rem; margin-top: 2px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 0.78rem;
  }

  .empty-state div { font-size: 2rem; margin-bottom: 12px; }

  @media (max-width: 800px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .report-header, .report-row {
      grid-template-columns: 120px 1fr 100px 80px;
    }
    .report-row > *:nth-child(5),
    .report-row > *:nth-child(6),
    .report-header > *:nth-child(5),
    .report-header > *:nth-child(6) { display: none; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Safe<span>Nest</span></div>
    <div class="login-sub">Admin Access Only</div>
    <div class="login-field">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="admin" autocomplete="off" />
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="login-btn" onclick="doLogin()">Access Dashboard →</button>
    <div class="login-error" id="login-error">Invalid credentials. Try again.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <nav>
    <div class="logo">Safe<span>Nest</span></div>
    <div class="nav-right">
      <div class="admin-badge">⚡ Admin Panel</div>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </nav>

  <main>
    <!-- STATS -->
    <div class="stats-row" id="stats-row"></div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="toolbar-title">Submitted Reports</div>
      <div class="toolbar-filters">
        <button class="filter-btn active" onclick="filterReports('all', this)">All</button>
        <button class="filter-btn" onclick="filterReports('new', this)">New</button>
        <button class="filter-btn" onclick="filterReports('review', this)">Under Review</button>
        <button class="filter-btn" onclick="filterReports('investigating', this)">Investigating</button>
        <button class="filter-btn" onclick="filterReports('resolved', this)">Resolved</button>
        <button class="filter-btn" onclick="filterReports('urgent', this)">🚨 Urgent</button>
      </div>
    </div>

    <!-- TABLE -->
    <div class="reports-container">
      <div class="report-header">
        <span>Ref Code</span>
        <span>Description</span>
        <span>Sector</span>
        <span>Severity</span>
        <span>Status</span>
        <span>Flag</span>
      </div>
      <div id="reports-list"></div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
  // ── CREDENTIALS (change these!) ──
  const ADMIN_USER = 'admin';
  const ADMIN_PASS = 'safenest2026';

  // ── SAMPLE DATA (replace with real DB later) ──
  let reports = [
    {
      id: 1,
      ref: 'BV-2026-A3KP',
      sector: 'Ministry of Finance',
      category: 'Financial Corruption / Bribery',
      severity: 'critical',
      description: 'Senior official demanding 15% kickback on all supplier invoices above M50,000. Has been ongoing since January 2026.',
      date: '2026-03-01',
      status: 'investigating',
      urgent: true,
      notes: [
        { text: 'Report received and flagged as critical. Assigned to senior reviewer.', date: '2026-03-01' },
        { text: 'Initial assessment complete. Escalated to investigation team.', date: '2026-03-03' }
      ]
    },
    {
      id: 2,
      ref: 'BV-2026-B7NX',
      sector: 'Lesotho Revenue Authority',
      category: 'Procurement Fraud',
      severity: 'high',
      description: 'Procurement contracts consistently awarded to same vendor without tender process. Suspect collusion.',
      date: '2026-03-03',
      status: 'review',
      urgent: false,
      notes: [
        { text: 'Report received. Under initial review.', date: '2026-03-03' }
      ]
    },
    {
      id: 3,
      ref: 'BV-2026-C2MQ',
      sector: 'Private Company',
      category: 'Sexual Harassment',
      severity: 'high',
      description: 'Manager making repeated inappropriate comments and unwanted physical contact with junior female staff.',
      date: '2026-03-05',
      status: 'new',
      urgent: true,
      notes: []
    },
    {
      id: 4,
      ref: 'BV-2026-D9RW',
      sector: 'Ministry of Health',
      category: 'Data / Records Falsification',
      severity: 'medium',
      description: 'Patient records being altered to hide medication stock shortages. Affecting multiple clinics.',
      date: '2026-03-06',
      status: 'new',
      urgent: false,
      notes: []
    },
    {
      id: 5,
      ref: 'BV-2026-E4TJ',
      sector: 'Lesotho Electricity Company',
      category: 'Workplace Safety Violation',
      severity: 'low',
      description: 'Staff working on live lines without proper protective equipment. Safety officer aware but not acting.',
      date: '2026-03-07',
      status: 'resolved',
      urgent: false,
      notes: [
        { text: 'Report reviewed and forwarded to LEC safety compliance team.', date: '2026-03-07' },
        { text: 'LEC confirmed corrective action taken. Case closed.', date: '2026-03-08' }
      ]
    }
  ];

  let currentFilter = 'all';
  let currentReport = null;

  function doLogin() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value.trim();
    if (u === ADMIN_USER && p === ADMIN_PASS) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderStats();
      renderReports();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  function doLogout() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-user').value = '';
    document.getElementById('login-pass').value = '';
  }

  function renderStats() {
    const total = reports.length;
    const urgent = reports.filter(r => r.urgent).length;
    const open = reports.filter(r => r.status !== 'resolved').length;
    const resolved = reports.filter(r => r.status === 'resolved').length;
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Reports</div><div class="stat-num">${total}</div></div>
      <div class="stat-card"><div class="stat-label">Open Cases</div><div class="stat-num blue">${open}</div></div>
      <div class="stat-card"><div class="stat-label">Urgent / Flagged</div><div class="stat-num red">${urgent}</div></div>
      <div class="stat-card"><div class="stat-label">Resolved</div><div class="stat-num orange">${resolved}</div></div>
    `;
  }

  function filterReports(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderReports();
  }

  function renderReports() {
    let filtered = reports;
    if (currentFilter === 'urgent') filtered = reports.filter(r => r.urgent);
    else if (currentFilter !== 'all') filtered = reports.filter(r => r.status === currentFilter);

    const list = document.getElementById('reports-list');
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><div>📭</div>No reports match this filter.</div>`;
      return;
    }

    list.innerHTML = filtered.map(r => `
      <div class="report-row ${r.urgent ? 'urgent' : ''}" onclick="openModal(${r.id})">
        <div class="ref-code">${r.ref}</div>
        <div class="report-desc">${r.description}</div>
        <div class="report-sector">${r.sector}</div>
        <div><span class="severity-pill sev-${r.severity}">${r.severity}</span></div>
        <div><span class="status-pill pill-${r.status}">${statusLabel(r.status)}</span></div>
        <div onclick="event.stopPropagation()">
          <button class="flag-btn ${r.urgent ? 'flagged' : ''}" onclick="toggleFlag(${r.id})">${r.urgent ? '🚨' : '🏳️'}</button>
        </div>
      </div>
    `).join('');
  }

  function statusLabel(s) {
    return { new: 'New', review: 'Under Review', investigating: 'Investigating', resolved: 'Resolved' }[s] || s;
  }

  function toggleFlag(id) {
    const r = reports.find(r => r.id === id);
    r.urgent = !r.urgent;
    renderStats();
    renderReports();
  }

  function openModal(id) {
    currentReport = reports.find(r => r.id === id);
    const r = currentReport;
    const modal = document.getElementById('modal-content');
    modal.innerHTML = `
      <div class="modal-header">
        <div class="modal-title">${r.ref}</div>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>

      <div class="detail-row"><span class="detail-label">Sector</span><span class="detail-val">${r.sector}</span></div>
      <div class="detail-row"><span class="detail-label">Category</span><span class="detail-val">${r.category}</span></div>
      <div class="detail-row"><span class="detail-label">Severity</span><span class="detail-val"><span class="severity-pill sev-${r.severity}">${r.severity}</span></span></div>
      <div class="detail-row"><span class="detail-label">Date Filed</span><span class="detail-val">${r.date}</span></div>
      <div class="detail-row"><span class="detail-label">Flagged Urgent</span><span class="detail-val">${r.urgent ? '🚨 Yes' : 'No'}</span></div>

      <div class="section-label">Full Description</div>
      <div class="description-box">${r.description}</div>

      <div class="section-label">Update Status</div>
      <select class="status-select" id="modal-status">
        <option value="new" ${r.status==='new'?'selected':''}>New</option>
        <option value="review" ${r.status==='review'?'selected':''}>Under Review</option>
        <option value="investigating" ${r.status==='investigating'?'selected':''}>Investigating</option>
        <option value="resolved" ${r.status==='resolved'?'selected':''}>Resolved</option>
      </select>

      <div class="section-label">Add Timeline Note <span style="color:var(--muted);font-size:0.65rem">(visible to reporter via their ref code)</span></div>
      <textarea class="note-input" id="modal-note" placeholder="e.g. Report reviewed and assigned to investigator. Further details requested..."></textarea>
      <button class="save-btn" onclick="saveChanges()">Save Changes</button>

      <div class="section-label" style="margin-top:28px">Timeline</div>
      <div class="timeline-list">
        ${r.notes.length === 0
          ? '<div style="color:var(--muted);font-size:0.75rem;padding:10px 0">No notes yet.</div>'
          : r.notes.map(n => `
            <div class="tl-item">
              <div class="tl-dot"></div>
              <div class="tl-content">
                <div>${n.text}</div>
                <div class="tl-date">${n.date}</div>
              </div>
            </div>
          `).join('')
        }
      </div>
    `;
    document.getElementById('modal-overlay').classList.add('open');
  }

  function saveChanges() {
    const r = currentReport;
    const newStatus = document.getElementById('modal-status').value;
    const noteText = document.getElementById('modal-note').value.trim();

    r.status = newStatus;
    if (noteText) {
      const today = new Date().toISOString().split('T')[0];
      r.notes.push({ text: noteText, date: today });
    }

    renderStats();
    renderReports();
    openModal(r.id); // refresh modal
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.remove('open');
    }
  }
</script>
</body>
</html>
